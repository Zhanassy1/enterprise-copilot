name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly full pipeline (UTC)
    - cron: "0 5 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Run backend unit tests (pytest; integration cases skip without Postgres)
        run: python -m pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: enterprise_copilot_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d enterprise_copilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5433/enterprise_copilot_test
      RUN_INTEGRATION_TESTS: "1"
      SQLALCHEMY_USE_NULLPOOL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      # Full suite with RUN_INTEGRATION_TESTS=1 so cross-workspace + API flow run (not skipped).
      - name: Run integration tests (pytest + unittest compatibility)
        run: python -m pytest tests/ -v

  backend-async-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: enterprise_copilot_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d enterprise_copilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5433/enterprise_copilot_test
      REDIS_URL: redis://localhost:6379/0
      RUN_ASYNC_PIPELINE_SMOKE: "1"
      RUN_INTEGRATION_TESTS: "1"
      INGESTION_ASYNC_ENABLED: "1"
      CELERY_TASK_ALWAYS_EAGER: "1"
      CELERY_TASK_EAGER_PROPAGATES: "1"
      SQLALCHEMY_USE_NULLPOOL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Async ingestion smoke (Celery eager + terminal document status)
        run: python -m unittest tests.test_ingestion_async_pipeline -v
