# Dev-oriented stack: Postgres and Redis publish ports to the host for local tools (DBeaver, redis-cli).
# Do not expose this compose file unchanged on the public internet. For production-style networking use:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_copilot
    ports:
      # DEV ONLY: published for host access; prod overlay removes these (docker-compose.prod.yml).
      # 5433 на хосте — если локальный Postgres уже слушает :5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_copilot"]
      interval: 5s
      timeout: 5s
      retries: 20

  db_test:
    image: pgvector/pgvector:pg16
    profiles: ["test"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_copilot_test
    ports:
      - "5434:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_copilot_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      # DEV ONLY: published for host access; prod overlay removes these.
      # 6380 на хосте — чтобы не конфликтовать с уже запущенным Redis на :6379
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/enterprise_copilot
      REDIS_URL: redis://redis:6379/0
      INGESTION_ASYNC_ENABLED: "1"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
    ports:
      # Если :8000 занят: в .env в корне проекта задай HOST_API_PORT=8001 (или export перед docker compose)
      - "${HOST_API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/enterprise_copilot
      REDIS_URL: redis://redis:6379/0
      INGESTION_ASYNC_ENABLED: "1"
    command: >
      bash -lc "alembic upgrade head &&
      celery -A app.celery_app.celery_app worker --loglevel=INFO --queues=ingestion"
    volumes:
      - ./backend:/app
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:${HOST_API_PORT:-8000}/api/v1
    environment:
      # Клиент ходит на тот же origin (/api/v1 → rewrite на api), чтобы логин работал и по localhost, и по IP в LAN.
      NEXT_PUBLIC_API_BASE: /api/v1
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    # Dev: как у api — исходники с хоста, иначе новые маршруты (например /pricing) пропадут до полного rebuild образа.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  pgdata_test:
  uploads:

