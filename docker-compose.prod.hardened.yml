# Third overlay: strict production profile (DB TLS, S3, trusted proxies required).
# Does not replace docker-compose.prod.yml — merge all three:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.prod.hardened.yml up -d --build
#
# DATABASE_URL must use a PostgreSQL endpoint that supports TLS and include ?sslmode=require (or equivalent).
# The default compose `db` service does not expose TLS to clients — use managed Postgres, or stay on
# docker-compose.yml + docker-compose.prod.yml (minimal profile) for internal db/redis only.
#
# Required in .env (see docs/hardened-deploy.md and .env.production.example):
#   TRUSTED_PROXY_IPS, S3_BUCKET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, plus DATABASE_URL / REDIS_URL / SECRET_KEY / CORS_ORIGINS as for prod.

services:
  api:
    environment:
      PRODUCTION_PROFILE: hardened
      PRODUCTION_REQUIRE_DATABASE_SSL: "1"
      PRODUCTION_REQUIRE_S3_BACKEND: "1"
      PRODUCTION_REQUIRE_TRUSTED_PROXY_IPS: "1"
      STORAGE_BACKEND: s3
      USE_FORWARDED_HEADERS: "1"
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:?Set TRUSTED_PROXY_IPS for ingress/LB CIDRs}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required for hardened overlay}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}

  worker:
    environment:
      PRODUCTION_PROFILE: hardened
      PRODUCTION_REQUIRE_DATABASE_SSL: "1"
      PRODUCTION_REQUIRE_S3_BACKEND: "1"
      PRODUCTION_REQUIRE_TRUSTED_PROXY_IPS: "1"
      STORAGE_BACKEND: s3
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:?Set TRUSTED_PROXY_IPS for ingress/LB CIDRs}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required for hardened overlay}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}

  celery-beat:
    environment:
      PRODUCTION_PROFILE: hardened
      PRODUCTION_REQUIRE_DATABASE_SSL: "1"
      PRODUCTION_REQUIRE_S3_BACKEND: "1"
      PRODUCTION_REQUIRE_TRUSTED_PROXY_IPS: "1"
      STORAGE_BACKEND: s3
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:?Set TRUSTED_PROXY_IPS for ingress/LB CIDRs}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required for hardened overlay}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
