[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP"]
# E501: legacy long lines; B008: FastAPI Depends/Body/File() in defaults is idiomatic.
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy relationship forward refs (Mapped["Model"]).
"app/models/**" = ["F821"]

[tool.mypy]
strict = false
ignore_missing_imports = true
python_version = "3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
