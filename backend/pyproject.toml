[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP"]
# E501: legacy long lines; B008: FastAPI Depends/Body/File() in defaults is idiomatic.
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy relationship forward refs (Mapped["Model"]).
"app/models/**" = ["F821"]

[tool.mypy]
strict = false
ignore_missing_imports = true
python_version = "3.12"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "retrieval_regression: seeded corpus + gold JSONL regression gates",
    "rerank_gain: optional real cross-encoder paired eval (RUN_RERANK_EVAL=1)",
    "p2_rag: 50-row P2 RAG eval (RUN_P2_EVAL=1, RUN_INTEGRATION_TESTS=1)",
    "perf: opt-in load/perf scenarios (requires RUN_PERF_TESTS=1)",
]
